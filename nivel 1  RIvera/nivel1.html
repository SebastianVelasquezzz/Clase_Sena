<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SYSTEC - LAVA EDITION COMENTADO</title>
    
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/gh/c-frame/aframe-physics-system@v4.2.2/dist/aframe-physics-system.min.js"></script>

    <style>
        /* Estilos CSS: Definen el look de la interfaz (UI) tipo terminal */
        body { margin: 0; font-family: 'Courier New', monospace; background: #000; overflow: hidden; touch-action: none; }
        
        .overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle, #2e0a0a 0%, #000 100%);
            z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center;
            color: #ff4400; text-align: center; border: 8px double #ff4400; box-sizing: border-box;
        }

        /* Caja de texto y botones estilo retro */
        .terminal-box { background: rgba(40, 10, 0, 0.95); padding: 40px; border: 2px solid #ff4400; box-shadow: 0 0 40px #ff4400; border-radius: 20px; }
        input { background: #000; border: 1px solid #ff4400; color: #ff4400; padding: 12px; font-size: 20px; text-align: center; width: 280px; margin-top: 20px; outline: none; text-transform: uppercase; }
        .btn-systec { margin-top: 30px; padding: 15px 40px; background: #ff4400; color: #000; border: none; font-weight: bold; cursor: pointer; font-size: 18px; }
        
        /* Controles para celulares */
        .controles-movil { position: absolute; bottom: 20px; width: 100%; display: none; justify-content: space-between; padding: 0 30px; box-sizing: border-box; z-index: 1000; pointer-events: none; }
        .d-pad { display: grid; grid-template-columns: repeat(3, 55px); gap: 5px; pointer-events: auto; }
        .d-btn, .btn-salto { width: 55px; height: 55px; background: rgba(255, 68, 0, 0.2); border: 2px solid #ff4400; color: #ff4400; display: flex; align-items: center; justify-content: center; border-radius: 10px; font-weight: bold; }
        .btn-salto { width: 100px; height: 80px; pointer-events: auto; }
    </style>

    <script>
        let nombrePiloto = "";
        let juegoIniciado = false;

        // Función para ocultar el registro y activar el juego
        function iniciarMision() {
            const input = document.querySelector('#input-nombre');
            if (input.value.trim() === "") { alert("ID REQUERIDO"); return; }
            nombrePiloto = input.value.toUpperCase();
            document.querySelector('#user-display').innerText = nombrePiloto;
            document.querySelector('#pantalla-registro').style.display = "none";
            document.querySelector('#ui-top').style.display = "block";
            
            // Detecta si es móvil para mostrar botones táctiles
            if ('ontouchstart' in window || navigator.maxTouchPoints > 0) { 
                document.querySelector('.controles-movil').style.display = "flex"; 
            }
            setTimeout(() => { juegoIniciado = true; }, 200);
        }

        // LÓGICA DEL JUEGO (Motor)
        AFRAME.registerComponent('motor-gameplay', {
            init: function () {
                this.vidas = 3;
                this.keys = {};
                this.puedeSaltar = true;
                
                // Escuchar teclado
                window.addEventListener('keydown', (e) => { this.keys[e.code] = true; });
                window.addEventListener('keyup', (e) => { this.keys[e.code] = false; });
                
                // Lógica de botones táctiles
                const bindTouch = (id, code) => {
                    const el = document.querySelector(id);
                    if(!el) return;
                    el.addEventListener('touchstart', (e) => { e.preventDefault(); this.keys[code] = true; }, {passive: false});
                    el.addEventListener('touchend', (e) => { e.preventDefault(); this.keys[code] = false; }, {passive: false});
                };
                bindTouch('#m-up', 'KeyW'); bindTouch('#m-down', 'KeyS');
                bindTouch('#m-left', 'KeyA'); bindTouch('#m-right', 'KeyD');
                bindTouch('#m-jump', 'Space');

                // Detectar colisión con la meta
                this.el.addEventListener('collide', (e) => {
                    const target = e.detail.body.el;
                    if (target && target.id === 'meta' && juegoIniciado) { 
                        this.finalizarJuego("MISIÓN COMPLETADA"); 
                    }
                });
            },

            perderVida: function() {
                this.vidas--;
                document.querySelector('#vidas-val').innerText = "🔥".repeat(this.vidas);
                if (this.vidas <= 0) {
                    this.finalizarJuego("PILOTO ELIMINADO");
                } else {
                    // Resetear posición si cae a la lava
                    this.el.body.position.set(0, 3, 0);
                    this.el.body.velocity.set(0, 0, 0);
                }
            },

            finalizarJuego: function(titulo) {
                juegoIniciado = false;
                document.querySelector('#game-over-screen').style.display = "flex";
                document.querySelector('#final-title').innerText = titulo;
                document.querySelector('#final-score').innerText = `ID: ${nombrePiloto}`;
            },

            tick: function () {
                if (!this.el.body || !juegoIniciado) return;
                
                // Forzar que el personaje no se caiga de lado
                this.el.body.quaternion.set(0, 0, 0, 1);
                
                let v = this.el.body.velocity;
                let f = 8.5; // Velocidad de movimiento
                
                // Controles de movimiento
                if (this.keys['KeyW']) v.z = -f; else if (this.keys['KeyS']) v.z = f; else v.z = 0;
                if (this.keys['KeyA']) v.x = -f; else if (this.keys['KeyD']) v.x = f; else v.x = 0;
                
                // Lógica de salto (solo si toca el suelo / velocidad Y cercana a 0)
                if (this.keys['Space'] && Math.abs(v.y) < 0.1 && this.puedeSaltar) {
                    v.y = 11.5; this.puedeSaltar = false;
                } else if (!this.keys['Space']) { this.puedeSaltar = true; }
                
                // Si la posición Y es menor a -2.5, significa que tocó la lava
                if (this.el.body.position.y < -2.5) this.perderVida();
            }
        });

        // Componente para que la cámara siga al jugador suavemente
        AFRAME.registerComponent('seguimiento-camara', {
            init: function () { this.objetivo = document.querySelector('#jugador'); },
            tick: function () {
                if (this.objetivo && juegoIniciado) {
                    this.el.object3D.position.lerp(this.objetivo.object3D.position, 0.1);
                }
            }
        });
    </script>
</head>
<body>

    <div class="controles-movil">
        <div class="d-pad">
            <div></div><div id="m-up" class="d-btn">▲</div><div></div>
            <div id="m-left" class="d-btn">◀</div><div id="m-down" class="d-btn">▼</div><div id="m-right" class="d-btn">▶</div>
        </div>
        <div id="m-jump" class="btn-salto">SALTO</div>
    </div>

    <div id="pantalla-registro" class="overlay">
        <div class="terminal-box">
            <h1>SYSTEC: LAVA BREACH</h1>
            <p>ADVERTENCIA: TEMPERATURAS CRÍTICAS</p>
            <input type="text" id="input-nombre" placeholder="ID DEL PILOTO" maxlength="12">
            <br>
            <button class="btn-systec" onclick="iniciarMision()">INICIAR SISTEMAS</button>
        </div>
    </div>

    <div id="ui-top">PILOTO: <span id="user-display">---</span> | <span id="vidas-val">🔥🔥🔥</span></div>

    <div id="game-over-screen" class="overlay" style="display: none;">
        <div class="terminal-box">
            <h1 id="final-title">CONEXIÓN PERDIDA</h1>
            <p id="final-score"></p>
            <button class="btn-systec" onclick="location.reload()">REINTENTAR</button>
        </div>
    </div>

    <a-scene physics="gravity: -22; friction: 0.1;">
        
        <a-assets>
            <img id="nebula" src="https://cdn.glitch.global/2040837a-4c81-434f-ae6d-f542944a3d00/nebula.jpg?v=1675865432123">
            <img id="lava-tex" src="https://img.freepik.com/free-photo/abstract-background-with-lava-texture_23-2148814464.jpg" crossorigin="anonymous">
        </a-assets>

        <a-sky src="#nebula" rotation="0 -90 0" color="#442200"></a-sky>
        <a-stars radius="150" count="3000" color="#ff4400"></a-stars>

        <a-plane position="0 -3 -40" 
                 rotation="-90 0 0" 
                 width="150" height="250" 
                 material="src: #lava-tex; repeat: 15 25; emissive: #ff2200; emissiveIntensity: 0.8"
                 animation="property: material.color; from: #ff6600; to: #ff0000; dur: 2500; dir: alternate; loop: true">
        </a-plane>

        <a-box static-body position="0 0 0" width="5" height="0.5" depth="5" color="#222"></a-box>
        
        <a-box static-body position="0 0.5 -8" width="3.5" height="0.5" depth="3" color="#ff4400"></a-box>
        <a-box static-body position="0 1 -16" width="3.5" height="0.5" depth="3" color="#ff4400"></a-box>

        <a-box static-body position="0 1.5 -26" width="1.5" height="0.3" depth="12" color="#111"></a-box>

        <a-box id="mover" static-body position="0 2 -38" width="4" height="0.5" depth="4" color="#ff0000"
               animation="property: position; from: 0 1 -38; to: 0 8 -38; dur: 4500; dir: alternate; loop: true; easing: easeInOutQuad"></a-box>

        <a-box static-body position="0 8 -48" width="2.5" height="0.5" depth="2.5" color="#ff4400"></a-box>
        <a-box static-body position="0 9.5 -56" width="2" height="0.5" depth="2" color="#ff4400"></a-box>
        <a-box static-body position="0 11 -64" width="2" height="0.5" depth="2" color="#ff6600"></a-box>

        <a-box static-body position="0 12 -72" width="4" height="0.5" depth="4" color="#fff"></a-box>

        <a-entity id="meta" static-body position="0 12.5 -88">
            <a-box width="10" height="0.5" depth="10" color="#ff4400" material="emissive: #ff4400; emissiveIntensity: 1"></a-box>
            <a-text value="NUCLEO ALCANZADO" align="center" position="0 4 0" scale="8 8 8" color="#ff4400"></a-text>
            <a-light type="point" intensity="4" color="#ff4400"></a-light>
        </a-entity>

        <a-entity id="jugador" position="0 3 0" motor-gameplay dynamic-body="mass: 2; fixedRotation: true">
            <a-cylinder radius="0.35" height="1.3" color="#222">
                <a-sphere position="0 0.9 0" radius="0.38" color="#ffccaa"></a-sphere>
            </a-cylinder>
        </a-entity>

        <a-entity id="rig-camara" seguimiento-camara>
            <a-camera position="0 7 11" look-controls="enabled: false" wasd-controls="enabled: false"></a-camera>
        </a-entity>

        <a-light type="ambient" intensity="0.5" color="#ff8866"></a-light>
        <a-light type="directional" position="2 10 5" intensity="0.6" color="#ff4400"></a-light>

    </a-scene>
</body>
</html>
